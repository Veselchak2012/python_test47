<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Python Тренажер</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Unbounded:wght@700;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   VARIABLES
══════════════════════════════════════ */
:root {
  --bg:      #0c0e16;
  --surf:    #131620;
  --surf2:   #181c2a;
  --border:  #21263a;
  --accent:  #4f8ef7;
  --violet:  #9b7ff4;
  --green:   #2ecc8f;
  --red:     #f16b6b;
  --yellow:  #f5c542;
  --text:    #dce4f5;
  --muted:   #5a6380;
  --muted2:  #8a95b0;
  --ed-bg:   #0d1017;
  --ed-text: #dce4f5;
  --ed-ph:   #2a3050;
  --tab-h:   56px;
  --bar-h:   60px;
  --hdr-h:   52px;
}
html.light {
  --bg:      #f0f2f8;
  --surf:    #ffffff;
  --surf2:   #f0f3fa;
  --border:  #dde2f0;
  --accent:  #2563eb;
  --violet:  #7c3aed;
  --green:   #059669;
  --red:     #dc2626;
  --yellow:  #d97706;
  --text:    #1e2340;
  --muted:   #8892b0;
  --muted2:  #5a6480;
  --ed-bg:   #f5f7ff;
  --ed-text: #1e2340;
  --ed-ph:   #b0bbd8;
}

/* ══════════════════════════════════════
   RESET & BASE
══════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { height:100%; overflow:hidden; }
body {
  font-family:'Manrope',sans-serif;
  background:var(--bg); color:var(--text);
  height:100%; overflow:hidden;
  transition:background .3s,color .3s;
}

/* ══════════════════════════════════════
   LAYOUT — full screen, 3 regions
   [HEADER] [CONTENT] [BOTTOM-BAR]
══════════════════════════════════════ */
.app {
  display:flex; flex-direction:column;
  height:100%; height:100dvh;
  position:relative;
}

/* ── HEADER ── */
.header {
  flex-shrink:0; height:var(--hdr-h);
  display:flex; align-items:center; gap:10px;
  padding:0 14px;
  background:var(--surf); border-bottom:1px solid var(--border);
  transition:background .3s,border-color .3s;
  z-index:10;
}
.logo {
  font-family:'Unbounded',sans-serif; font-size:13px; font-weight:900;
  background:linear-gradient(135deg,var(--accent),var(--violet));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  flex-shrink:0;
}
.header-score {
  display:flex; align-items:center; gap:8px; flex:1;
}
.score-pill {
  display:flex; align-items:center; gap:6px;
  background:var(--surf2); border:1px solid var(--border);
  border-radius:20px; padding:4px 10px;
}
.score-num {
  font-family:'Unbounded',sans-serif; font-size:14px; font-weight:900;
  background:linear-gradient(135deg,var(--green),var(--accent));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.score-denom { font-size:11px; color:var(--muted); }
.prog-wrap { flex:1; max-width:100px; }
.prog-track { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
.prog-fill {
  height:100%; background:linear-gradient(90deg,var(--accent),var(--green));
  border-radius:2px; transition:width .6s cubic-bezier(.34,1.56,.64,1); width:0%;
}
.header-actions { display:flex; gap:6px; align-items:center; }
.icon-btn {
  width:36px; height:36px; border-radius:10px; border:1px solid var(--border);
  background:var(--surf2); color:var(--muted2);
  display:flex; align-items:center; justify-content:center;
  font-size:16px; cursor:pointer; transition:.2s; flex-shrink:0;
}
.icon-btn:hover { border-color:var(--accent); color:var(--accent); }
.font-ctrl {
  display:flex; align-items:center; gap:2px;
  background:var(--surf2); border:1px solid var(--border);
  border-radius:10px; padding:2px;
}
.font-btn {
  width:30px; height:30px; border:none; background:none; cursor:pointer;
  font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700;
  color:var(--muted2); border-radius:8px; transition:.15s;
  display:flex; align-items:center; justify-content:center;
}
.font-btn:hover { background:rgba(79,142,247,.12); color:var(--accent); }
.font-lbl { font-size:10px; color:var(--muted); min-width:28px; text-align:center; font-family:'JetBrains Mono',monospace; }

/* ── TASK TABS ── */
.task-tabs {
  flex-shrink:0; height:var(--tab-h);
  display:flex; align-items:stretch;
  background:var(--surf); border-bottom:1px solid var(--border);
  overflow-x:auto; overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  transition:background .3s,border-color .3s;
}
.task-tabs::-webkit-scrollbar { display:none; }
.tab {
  flex-shrink:0; min-width:80px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:2px; padding:0 16px; cursor:pointer;
  border-bottom:2px solid transparent;
  transition:.2s; position:relative;
  font-size:11px; font-weight:600; color:var(--muted2);
}
.tab.active { border-bottom-color:var(--accent); color:var(--accent); }
.tab.solved { color:var(--green); }
.tab.solved.active { border-bottom-color:var(--green); }
.tab-num {
  font-family:'Unbounded',sans-serif; font-size:9px; font-weight:700;
  opacity:.6;
}
.tab-pts {
  font-family:'JetBrains Mono',monospace; font-size:10px;
}
.tab.solved .tab-pts { color:var(--green); }
.tab-check {
  position:absolute; top:6px; right:6px;
  font-size:10px; color:var(--green);
  display:none;
}
.tab.solved .tab-check { display:block; }

/* ── CONTENT AREA (scrollable panels) ── */
.content {
  flex:1; overflow:hidden;
  display:flex; flex-direction:column;
  min-height:0;
}

/* Panels — swipeable via JS */
.panels {
  flex:1; display:flex;
  min-height:0; overflow:hidden;
}
.panel {
  flex-shrink:0; width:100%;
  display:flex; flex-direction:column;
  overflow:hidden;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}

/* ── PANEL: TASK ── */
.task-panel {
  overflow-y:auto; -webkit-overflow-scrolling:touch;
  padding:16px;
}
.task-header-card {
  background:var(--surf); border:1px solid var(--border);
  border-radius:14px; padding:14px 16px; margin-bottom:14px;
  transition:background .3s,border-color .3s;
}
.task-badge {
  font-family:'Unbounded',sans-serif; font-size:9px; font-weight:700;
  color:var(--accent); background:rgba(79,142,247,.12);
  border:1px solid rgba(79,142,247,.2);
  border-radius:6px; padding:3px 8px; letter-spacing:.8px;
  display:inline-block; margin-bottom:8px;
}
.task-title { font-size:15px; font-weight:700; margin-bottom:4px; }
.pts-label {
  font-size:11px; font-weight:700; color:var(--yellow);
  background:rgba(245,197,66,.1); border:1px solid rgba(245,197,66,.2);
  border-radius:6px; padding:2px 8px; display:inline-block;
}

.desc-card {
  background:var(--surf); border:1px solid var(--border);
  border-radius:14px; padding:14px 16px; margin-bottom:14px;
  font-size:13.5px; line-height:1.75; color:var(--muted2);
  transition:background .3s,border-color .3s;
}
.desc-card b { color:var(--text); }
.desc-card code {
  font-family:'JetBrains Mono',monospace; font-size:12px;
  background:rgba(79,142,247,.12); color:var(--accent);
  border-radius:4px; padding:1px 5px;
}

.examples-label { font-size:10px; font-weight:700; color:var(--muted); letter-spacing:.8px; text-transform:uppercase; margin-bottom:8px; }
.examples-grid { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
.ex-chip {
  display:flex; align-items:center; gap:8px;
  background:var(--surf2); border:1px solid var(--border);
  border-radius:10px; padding:8px 12px;
  font-family:'JetBrains Mono',monospace; font-size:12px;
  flex-wrap:wrap;
  transition:background .3s,border-color .3s;
}
.ex-in  { color:var(--muted2); }
.ex-arr { color:var(--muted); }
.ex-out { color:var(--green); font-weight:600; }

.hint-btn-inline {
  width:100%; padding:12px; border-radius:12px;
  background:rgba(155,127,244,.08); border:1px solid rgba(155,127,244,.2);
  color:var(--violet); font-family:'Manrope',sans-serif; font-size:13px; font-weight:600;
  cursor:pointer; transition:.2s;
}
.hint-btn-inline:hover { background:rgba(155,127,244,.15); }

/* ── PANEL: EDITOR ── */
.editor-panel {
  flex:1; display:flex; flex-direction:column; min-height:0;
}
.editor-topbar {
  flex-shrink:0; display:flex; align-items:center; justify-content:space-between;
  padding:8px 12px; background:var(--ed-bg); border-bottom:1px solid var(--border);
  transition:background .3s,border-color .3s;
}
.editor-lang { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--muted); font-family:'JetBrains Mono',monospace; }
.dot { width:7px; height:7px; border-radius:50%; background:var(--yellow); }
.btn-clear {
  font-size:11px; color:var(--muted); background:none; border:none; cursor:pointer;
  padding:4px 8px; border-radius:6px; transition:.2s;
}
.btn-clear:active { color:var(--red); }

.editor-wrap {
  flex:1; display:flex; min-height:0;
  background:var(--ed-bg); transition:background .3s;
}
#line-numbers {
  flex-shrink:0; width:40px;
  background:var(--ed-bg); border-right:1px solid var(--border);
  padding:16px 0; overflow:hidden;
  font-family:'JetBrains Mono',monospace; font-size:14px; line-height:1.75;
  color:var(--muted); text-align:right; user-select:none;
  transition:background .3s,border-color .3s;
}
#line-numbers span { display:block; padding-right:8px; font-size:12px; }
#codearea {
  flex:1; resize:none; outline:none; border:none;
  background:transparent; color:var(--ed-text); caret-color:var(--accent);
  font-family:'JetBrains Mono',monospace; font-size:14px; line-height:1.75;
  padding:16px 14px 16px 10px; tab-size:4;
  overflow:auto; -webkit-overflow-scrolling:touch;
  transition:color .3s;
}
#codearea::placeholder { color:var(--ed-ph); }
#codearea::selection   { background:rgba(79,142,247,.28); }

.run-bar {
  flex-shrink:0; display:flex; align-items:center; gap:8px;
  padding:10px 12px; background:var(--surf); border-top:1px solid var(--border);
  transition:background .3s,border-color .3s;
}
.btn-run {
  flex:1; display:flex; align-items:center; justify-content:center; gap:8px;
  background:linear-gradient(135deg,var(--accent),#3a78e8);
  color:#fff; border:none; cursor:pointer;
  font-family:'Manrope',sans-serif; font-size:14px; font-weight:700;
  padding:12px; border-radius:12px;
  box-shadow:0 4px 14px rgba(79,142,247,.3); transition:.2s;
}
.btn-run:active { transform:scale(.97); }
.btn-run:disabled { opacity:.5; }
.run-status {
  font-size:12px; color:var(--muted); flex:1;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.run-status.ok  { color:var(--green); font-weight:700; }
.run-status.err { color:var(--red);   font-weight:700; }

/* ── PANEL: TESTS ── */
.tests-panel {
  overflow-y:auto; -webkit-overflow-scrolling:touch;
  padding:12px;
}
.tests-summary {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:10px;
}
.tests-label { font-size:11px; font-weight:700; color:var(--muted); letter-spacing:.8px; text-transform:uppercase; }
.tests-count { font-size:12px; font-family:'JetBrains Mono',monospace; color:var(--muted2); }
.tc {
  background:var(--surf); border:1px solid var(--border);
  border-radius:12px; padding:10px 12px; margin-bottom:8px;
  transition:border-color .3s,background .3s;
}
.tc.pass { border-color:rgba(46,204,143,.4); background:rgba(46,204,143,.04); }
.tc.fail { border-color:rgba(241,107,107,.3); background:rgba(241,107,107,.04); }
.tc-head { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.tc-icon { font-size:15px; }
.tc-num  { font-size:10px; color:var(--muted); font-family:'JetBrains Mono',monospace; }
.tc-rows { font-family:'JetBrains Mono',monospace; font-size:11.5px; display:flex; flex-direction:column; gap:3px; }
.tc-row  { display:flex; gap:6px; flex-wrap:wrap; }
.tc-key  { color:var(--muted); min-width:78px; }
.tc-val  { color:var(--muted2); word-break:break-all; }
.tc-val.got-ok  { color:var(--green); }
.tc-val.got-err { color:var(--red); }

/* ── BOTTOM NAV BAR ── */
.bottom-bar {
  flex-shrink:0; height:var(--bar-h);
  display:flex; align-items:stretch;
  background:var(--surf); border-top:1px solid var(--border);
  transition:background .3s,border-color .3s;
  z-index:10;
  /* safe area for iPhone home indicator */
  padding-bottom:env(safe-area-inset-bottom);
}
.nav-tab {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:3px; cursor:pointer; border:none; background:none;
  color:var(--muted2); font-size:10px; font-weight:600;
  transition:.2s; border-top:2px solid transparent;
}
.nav-tab.active { color:var(--accent); border-top-color:var(--accent); }
.nav-tab-icon { font-size:20px; line-height:1; }

/* ── HINT MODAL ── */
.hint-overlay {
  display:none; position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,.65); backdrop-filter:blur(6px);
  align-items:flex-end; justify-content:center;
}
.hint-overlay.show { display:flex; }
.hint-sheet {
  background:var(--surf); border:1px solid var(--border);
  border-radius:22px 22px 0 0; padding:20px 22px 32px;
  width:100%; max-width:640px;
  animation:slideUp .3s cubic-bezier(.34,1.2,.64,1);
  max-height:70vh; overflow-y:auto;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.sheet-handle {
  width:36px; height:4px; background:var(--border);
  border-radius:2px; margin:0 auto 16px;
}
.hint-title { font-size:15px; font-weight:700; color:var(--violet); margin-bottom:10px; }
.hint-body  { font-size:13.5px; line-height:1.8; color:var(--muted2); }
.hint-body code {
  font-family:'JetBrains Mono',monospace; font-size:12px;
  background:rgba(155,127,244,.12); color:var(--violet);
  border-radius:4px; padding:1px 5px;
}
.hint-close {
  margin-top:18px; width:100%;
  background:rgba(155,127,244,.12); color:var(--violet);
  border:1px solid rgba(155,127,244,.25);
  cursor:pointer; font-family:'Manrope',sans-serif; font-size:14px; font-weight:700;
  padding:13px; border-radius:14px; transition:.2s;
}

/* ── FLASH ── */
.flash {
  position:fixed; top:16px; left:50%; transform:translateX(-50%);
  background:rgba(46,204,143,.15); border:1px solid rgba(46,204,143,.4);
  color:var(--green); font-size:13px; font-weight:700;
  padding:10px 22px; border-radius:12px;
  box-shadow:0 8px 24px rgba(46,204,143,.2);
  z-index:300; pointer-events:none; display:none;
  white-space:nowrap;
}

/* ══════════════════════════════════════
   TABLET / DESKTOP  ≥ 768px
   Sidebar + split view
══════════════════════════════════════ */
@media (min-width: 768px) {
  html { overflow:auto; }
  body { overflow:auto; height:auto; }
  .app  { height:100vh; height:100dvh; flex-direction:row; flex-wrap:wrap; }

  /* Sidebar replaces task-tabs on desktop */
  .task-tabs { display:none; }
  .bottom-bar { display:none; }

  /* Left sidebar */
  .sidebar {
    display:flex !important;
    flex-direction:column;
    width:230px; flex-shrink:0;
    background:var(--surf); border-right:1px solid var(--border);
    height:100%; overflow-y:auto;
    transition:background .3s,border-color .3s;
  }
  .sidebar-header { padding:20px 16px 14px; border-bottom:1px solid var(--border); }
  .sidebar-logo {
    font-family:'Unbounded',sans-serif; font-size:13px; font-weight:900;
    background:linear-gradient(135deg,var(--accent),var(--violet));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    margin-bottom:14px;
  }
  .score-widget {
    background:var(--surf2); border:1px solid var(--border);
    border-radius:12px; padding:12px 14px;
  }
  .sw-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .sw-label { font-size:10px; color:var(--muted); letter-spacing:.7px; text-transform:uppercase; }
  .sw-val {
    font-family:'Unbounded',sans-serif; font-size:20px; font-weight:900;
    background:linear-gradient(135deg,var(--green),var(--accent));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .sw-denom { font-size:12px; color:var(--muted); }
  .nav-list { padding:10px 8px; flex:1; }
  .nav-item {
    display:flex; align-items:center; gap:10px;
    padding:9px 10px; border-radius:10px; cursor:pointer; margin-bottom:3px;
    border:1px solid transparent; font-size:12px; font-weight:500; color:var(--muted2);
    transition:.15s;
  }
  .nav-item:hover { background:var(--surf2); color:var(--text); }
  .nav-item.active { background:rgba(79,142,247,.12); border-color:rgba(79,142,247,.25); color:var(--accent); }
  .nav-item.solved { color:var(--green); }
  .nav-item.solved.active { background:rgba(46,204,143,.08); border-color:rgba(46,204,143,.25); }
  .nav-num {
    font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:600;
    width:22px; height:22px; border-radius:6px; display:flex; align-items:center; justify-content:center;
    background:var(--border); flex-shrink:0;
  }
  .nav-item.solved .nav-num { background:rgba(46,204,143,.15); color:var(--green); }
  .nav-item.active .nav-num { background:rgba(79,142,247,.2); color:var(--accent); }
  .nav-title { flex:1; line-height:1.3; }
  .nav-pts { font-size:11px; font-family:'JetBrains Mono',monospace; }
  .nav-pts.solved { color:var(--green); }

  /* Header spans full width above content */
  .header { width:100%; order:-1; }

  /* Main content area = full width minus sidebar */
  .content {
    flex:1; min-width:0; height:calc(100% - var(--hdr-h));
    display:flex; flex-direction:row;
  }

  /* On tablet+: show both task panel and editor side by side */
  .panels { display:flex; flex-direction:row; }
  .panel { width:auto; transform:none !important; }

  .task-panel {
    width:360px; flex-shrink:0;
    border-right:1px solid var(--border);
    overflow-y:auto;
    padding:20px;
  }
  .editor-panel { flex:1; min-width:0; }

  /* Tests panel: shown inline in task panel area on desktop */
  .tests-panel-wrap {
    border-top:1px solid var(--border);
    padding:0;
  }
}

@media (min-width: 1100px) {
  .task-panel { width:400px; }
  #codearea { font-size:15px; }
  #line-numbers { font-size:14px; }
}
</style>
</head>
<body>
<div class="app">

  <!-- ── SIDEBAR (tablet/desktop only) ── -->
  <aside class="sidebar" style="display:none">
    <div class="sidebar-header">
      <div class="sidebar-logo">pytrain</div>
      <div class="score-widget">
        <div class="sw-row">
          <div class="sw-label">Бали</div>
          <div><span class="sw-val" id="swVal">0</span><span class="sw-denom"> / 12</span></div>
        </div>
        <div class="prog-track"><div class="prog-fill" id="swFill"></div></div>
      </div>
    </div>
    <nav class="nav-list" id="sideNav"></nav>
  </aside>

  <!-- ── HEADER ── -->
  <header class="header">
    <div class="logo">pytrain</div>
    <div class="header-score">
      <div class="score-pill">
        <span class="score-num" id="scoreNum">0</span>
        <span class="score-denom">/ 12</span>
      </div>
      <div class="prog-wrap">
        <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
      </div>
    </div>
    <div class="header-actions">
      <div class="font-ctrl">
        <button class="font-btn" onclick="changeUIFont(-1)">A−</button>
        <span class="font-lbl" id="fontLbl">100%</span>
        <button class="font-btn" onclick="changeUIFont(1)">A+</button>
      </div>
      <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="Тема">☀️</button>
    </div>
  </header>

  <!-- ── TASK TABS (mobile only) ── -->
  <div class="task-tabs" id="taskTabs"></div>

  <!-- ── CONTENT ── -->
  <div class="content">
    <div class="panels" id="panels">

      <!-- PANEL 1: Task description -->
      <div class="panel task-panel" id="panelTask">
        <div class="task-header-card">

function renderTests(idx, results) {

// ══════════════════════════════════════════════
//  EDITOR KEYBOARD
// ══════════════════════════════════════════════
function handleKey(e) {
  const ta = e.target;
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = ta.selectionStart, end = ta.selectionEnd;
    if (s === end) { insertAt(ta, s, '    ', 4); }
    else {
      const b = ta.value.slice(0,s), sel = ta.value.slice(s,end), a = ta.value.slice(end);
      const ind = sel.replace(/^/gm,'    ');
      ta.value = b + ind + a; ta.selectionStart = s; ta.selectionEnd = s + ind.length;
    }
    updateLineNumbers(); return;
  }
  if (e.key === 'Enter') {
    e.preventDefault();
    const pos = ta.selectionStart;
    const before = ta.value.slice(0, pos);
    const lineStart = before.lastIndexOf('\n') + 1;
    const curLine = before.slice(lineStart);
    let indent = curLine.match(/^(\s*)/)[1];
    if (curLine.trimEnd().endsWith(':')) indent += '    ';
    insertAt(ta, pos, '\n' + indent, 1 + indent.length);
    updateLineNumbers(); return;
  }
  if (e.key === 'Backspace' && ta.selectionStart === ta.selectionEnd) {
    const pos = ta.selectionStart;
    const before = ta.value.slice(0, pos);
    const prefix = before.slice(before.lastIndexOf('\n') + 1);
    if (/^ +$/.test(prefix) && prefix.length % 4 === 0 && prefix.length > 0) {
      e.preventDefault();
      ta.value = ta.value.slice(0, pos - 4) + ta.value.slice(pos);
      ta.selectionStart = ta.selectionEnd = pos - 4;
      updateLineNumbers();
    }
  }
}
function insertAt(ta, pos, text, offset) {
  const b = ta.value.slice(0, pos), a = ta.value.slice(ta.selectionEnd);
  ta.value = b + text + a;
  ta.selectionStart = ta.selectionEnd = pos + offset;
}
function clearCode() {

  document.getElementById('codearea').value = '';
  updateLineNumbers();

  document.getElementById('runStatus').className   = 'run-status';
  renderTests(current, []);
}

// ══════════════════════════════════════════════
//  PYTHON INTERPRETER
// ══════════════════════════════════════════════
function runPython(code, inputStr) {
  const lines = (inputStr||'').split('\n');
  let idx = 0;
  const out = [];
  try {
    const js = pyToJs(code);
    const fn = new Function('print','input','int','float','str','len','abs','round','"use strict";\n'+js);
    fn(
      (...a)=>out.push(a.map(v=>v==null?'None':String(v)).join(' ')),
      ()=>lines[idx++]??'',
      x=>{const n=parseInt(x,10);if(isNaN(n))throw new Error(`ValueError: invalid literal for int(): '${x}'`);return n;},
      x=>{const n=parseFloat(x);if(isNaN(n))throw new Error(`ValueError: could not convert to float: '${x}'`);return n;},
      x=>String(x),x=>x.length,Math.abs,(x,d=0)=>Math.round(x*10**d)/10**d
    );
    return {ok:true, output:out.join('\n')};
  } catch(e) { return {ok:false, error:e.message}; }
}
function pyToJs(src) {
  const lines = src.split('\n'); let i = 0;
  function block(mi) {
    let r='';
    while(i<lines.length){
      const raw=lines[i];
      if(raw.trim()===''||raw.trim().startsWith('#')){i++;r+='\n';continue;}
      const ind=raw.match(/^(\s*)/)[1].length;
      if(ind<mi)break;
      const s=raw.trim();
      const mIf=s.match(/^if\s+(.+):$/);
      if(mIf){r+=' '.repeat(ind)+`if(${cond(mIf[1])}){\n`;i++;r+=block(ind+1);r+=' '.repeat(ind)+'}\n';
        while(i<lines.length){const nxt=lines[i];if(!nxt)break;const ni=nxt.match(/^(\s*)/)[1].length,ns=nxt.trim();
          if(ni===ind){const mE=ns.match(/^elif\s+(.+):$/);if(mE){r+=' '.repeat(ind)+`else if(${cond(mE[1])}){\n`;i++;r+=block(ind+1);r+=' '.repeat(ind)+'}\n';continue;}
            if(ns==='else:'){r+=' '.repeat(ind)+'else{\n';i++;r+=block(ind+1);r+=' '.repeat(ind)+'}\n';break;}}break;}continue;}
      const mP=s.match(/^print\((.*)\)$/);if(mP){r+=' '.repeat(ind)+`print(${expr(mP[1])});\n`;i++;continue;}
      const mA=s.match(/^([a-zA-Z_]\w*)\s*(\+=|-=|\*=|\/=|%=)\s*(.+)$/);if(mA){r+=' '.repeat(ind)+`${mA[1]} ${mA[2]} ${expr(mA[3])};\n`;i++;continue;}
      const mAs=s.match(/^([a-zA-Z_]\w*)\s*=\s*(.+)$/);if(mAs&&!s.startsWith('==')){r+=' '.repeat(ind)+`var ${mAs[1]} = ${expr(mAs[2])};\n`;i++;continue;}
      r+=' '.repeat(ind)+`${expr(s)};\n`;i++;
    }
    return r;
  }
  return block(0);
}
function cond(s){
  s=s.trim();
  s=s.replace(/([\w.]+)\s*([<>]=?|==|!=)\s*([\w.]+)\s*([<>]=?|==|!=)\s*([\w.]+)/g,(_,a,o1,b,o2,c)=>`(${a}${o1}${b}&&${b}${o2}${c})`);
  s=s.replace(/(\w+)\s+not\s+in\s+\(([^)]+)\)/g,(_,v,it)=>`![${it}].includes(${v})`);
  s=s.replace(/(\w+)\s+in\s+\(([^)]+)\)/g,(_,v,it)=>`[${it}].includes(${v})`);
  s=s.replace(/\band\b/g,'&&').replace(/\bor\b/g,'||').replace(/\bnot\b/g,'!');
  s=s.replace(/\bTrue\b/g,'true').replace(/\bFalse\b/g,'false');
  return expr(s);
}
function expr(s){
  if(!s)return s;s=s.trim();
  s=s.replace(/f"([^"]*)"/g,(_,c)=>'`'+c.replace(/\{([^}]+)\}/g,'${$1}')+'`');
  s=s.replace(/f'([^']*)'/g,(_,c)=>'`'+c.replace(/\{([^}]+)\}/g,'${$1}')+'`');
  s=s.replace(/(\w+|\([^)]+\))\s*\*\*\s*(\w+)/g,'Math.pow($1,$2)');
  s=s.replace(/\bTrue\b/g,'true').replace(/\bFalse\b/g,'false').replace(/\bNone\b/g,'null');
  return s;
}

// ══════════════════════════════════════════════
//  RUN CODE
// ══════════════════════════════════════════════
function runCode() {
  const code = document.getElementById('codearea').value.trim();
  if (!code) { showStatus('Напишіть код перед запуском!','err'); return; }
  const btn = document.getElementById('btnRun');
  btn.disabled = true; btn.textContent = '⏳ Виконується...';
  setTimeout(() => {
    const task = TASKS[current];
    const results = task.tests.map(t => runPython(code, t.input));
    renderTests(current, results);
    const passed = results.filter((r,i) => r.ok && r.output.trim() === task.tests[i].expected.trim()).length;
    const total  = task.tests.length;
    if (passed === total) {
      const wasNew = !solved[current];
      solved[current] = true; scores[current] = PTS_PER_TASK;
      showStatus(`✓ Всі ${total} тести пройдено! +${PTS_PER_TASK} бали`, 'ok');
      updateScore();
      buildTabs(); buildSideNav();
      document.getElementById('taskPts').textContent = `${PTS_PER_TASK} / ${PTS_PER_TASK} бали`;
      if (wasNew) showFlash(`🎉 Завдання ${current+1} виконано! +${PTS_PER_TASK} бали`);
      // Auto-switch to tests panel on mobile
      if (window.innerWidth < 768) showPanel(2);
    } else {
      const errMsg = results.find(r => !r.ok);
      if (errMsg) showStatus(`✕ Помилка: ${errMsg.error}`, 'err');
      else        showStatus(`✕ Пройдено ${passed} з ${total} тестів`, 'err');
      if (window.innerWidth < 768) showPanel(2);
    }
    btn.disabled = false; btn.textContent = '▶ Запустити';
  }, 80);
}

function updateScore() {
  const total = scores.reduce((a,b) => a+b, 0);
  document.getElementById('scoreNum').textContent  = total;
  document.getElementById('progFill').style.width  = (total/MAX_SCORE*100)+'%';
  document.getElementById('swVal') && (document.getElementById('swVal').textContent = total);
  document.getElementById('swFill') && (document.getElementById('swFill').style.width = (total/MAX_SCORE*100)+'%');
}

function showStatus(msg, type) {
  const el = document.getElementById('runStatus');
  el.textContent = msg; el.className = 'run-status ' + type;
}
function showFlash(msg) {
  const f = document.getElementById('flash');
  f.textContent = msg; f.style.display = 'block';
  setTimeout(() => { f.style.display = 'none'; }, 2800);
}

// ══════════════════════════════════════════════
//  HINT
// ══════════════════════════════════════════════
function showHint() {
  document.getElementById('hintBody').innerHTML = TASKS[current].hint;
  document.getElementById('hintOverlay').classList.add('show');
}
function closeHint() { document.getElementById('hintOverlay').classList.remove('show'); }
function closeHintBg(e) { if (e.target === document.getElementById('hintOverlay')) closeHint(); }

// ══════════════════════════════════════════════
//  THEME & FONT
// ══════════════════════════════════════════════
let isLight = false;
function toggleTheme() {
  isLight = !isLight;
  document.documentElement.classList.toggle('light', isLight);
  document.getElementById('themeBtn').textContent = isLight ? '🌙' : '☀️';
}

let uiScale = 100;
function changeUIFont(delta) {
  uiScale = Math.min(150, Math.max(75, uiScale + delta * 10));
  document.body.style.zoom = uiScale + '%';
  document.getElementById('fontLbl').textContent = uiScale + '%';
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
initPanels();
buildTabs();
buildSideNav();
renderTask(0);
showPanel(0);

document.getElementById('codearea').addEventListener('drop', e => e.preventDefault());

// Re-init on resize
window.addEventListener('resize', () => {
  if (window.innerWidth >= 768) {
    // Reset panel transforms on desktop
    document.querySelectorAll('.panel').forEach(p => {
      p.style.transform = ''; p.style.position = '';
      p.style.top=''; p.style.left=''; p.style.width=''; p.style.height='';
    });
  } else {
    initPanels(); showPanel(activePanel);
  }
});
</script>
